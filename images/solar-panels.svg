<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300" role="img" aria-labelledby="panels-title panels-desc">
  <title id="panels-title">Close-up view of a commercial solar panel array</title>
  <desc id="panels-desc">Top-down stylised illustration of a large utility-scale solar PV farm: a grid of dark blue photovoltaic panels arranged in neat rows on green ground, with a bright sky behind.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="panelGradient2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="120" fill="url(#bgGradient)"/>

  <!-- Sun glow -->
  <circle cx="80" cy="60" r="30" fill="#F59E0B" opacity="0.85"/>
  <circle cx="80" cy="60" r="22" fill="#FBBF24"/>

  <!-- Ground -->
  <rect y="120" width="400" height="180" fill="#10B981" opacity="0.45"/>
  <rect y="270" width="400" height="30" fill="#065F46"/>

  <!-- 4 rows of solar panels in perspective -->
  <g>
    <!-- Row 1 (back, smallest) -->
    <g transform="translate(60,135)">
      <polygon points="0,0 280,0 270,15 10,15" fill="url(#panelGradient2)" stroke="#0F172A" stroke-width="0.8"/>
      <g stroke="#3B82F6" stroke-width="0.5" opacity="0.5">
        <line x1="70" y1="0" x2="65" y2="15"/>
        <line x1="140" y1="0" x2="140" y2="15"/>
        <line x1="210" y1="0" x2="215" y2="15"/>
      </g>
      <rect x="135" y="15" width="4" height="8" fill="#374151"/>
    </g>

    <!-- Row 2 -->
    <g transform="translate(40,165)">
      <polygon points="0,0 320,0 310,22 10,22" fill="url(#panelGradient2)" stroke="#0F172A" stroke-width="1"/>
      <g stroke="#3B82F6" stroke-width="0.6" opacity="0.55">
        <line x1="80" y1="0" x2="75" y2="22"/>
        <line x1="160" y1="0" x2="160" y2="22"/>
        <line x1="240" y1="0" x2="245" y2="22"/>
        <line x1="0" y1="11" x2="320" y2="11"/>
      </g>
      <rect x="155" y="22" width="5" height="11" fill="#374151"/>
    </g>

    <!-- Row 3 -->
    <g transform="translate(20,205)">
      <polygon points="0,0 360,0 350,28 10,28" fill="url(#panelGradient2)" stroke="#0F172A" stroke-width="1.2"/>
      <g stroke="#3B82F6" stroke-width="0.7" opacity="0.6">
        <line x1="90" y1="0" x2="85" y2="28"/>
        <line x1="180" y1="0" x2="180" y2="28"/>
        <line x1="270" y1="0" x2="275" y2="28"/>
        <line x1="0" y1="14" x2="360" y2="14"/>
      </g>
      <rect x="175" y="28" width="6" height="14" fill="#374151"/>
    </g>

    <!-- Row 4 (front, largest) -->
    <g transform="translate(0,250)">
      <polygon points="0,0 400,0 390,36 10,36" fill="url(#panelGradient2)" stroke="#0F172A" stroke-width="1.5"/>
      <g stroke="#3B82F6" stroke-width="0.8" opacity="0.65">
        <line x1="100" y1="0" x2="95" y2="36"/>
        <line x1="200" y1="0" x2="200" y2="36"/>
        <line x1="300" y1="0" x2="305" y2="36"/>
        <line x1="0" y1="12" x2="400" y2="12"/>
        <line x1="0" y1="24" x2="400" y2="24"/>
      </g>
      <!-- Highlight reflection -->
      <polygon points="0,0 60,0 35,36 0,36" fill="#60A5FA" opacity="0.15"/>
    </g>
  </g>
</svg>
