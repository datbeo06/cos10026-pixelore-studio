<svg xmlns="http://www.w3.org/2000/svg" width="180" height="48" viewBox="0 0 180 48" role="img" aria-label="SolarCore Energy logo">
  <title>SolarCore Energy</title>
  <!-- Sun icon: golden core with radiating rays -->
  <g transform="translate(20,24)">
    <!-- Outer rays (8-point sun) -->
    <g stroke="#F59E0B" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-16" x2="0" y2="-11"/>
      <line x1="0" y1="11" x2="0" y2="16"/>
      <line x1="-16" y1="0" x2="-11" y2="0"/>
      <line x1="11" y1="0" x2="16" y2="0"/>
      <line x1="-11.3" y1="-11.3" x2="-7.8" y2="-7.8"/>
      <line x1="7.8" y1="7.8" x2="11.3" y2="11.3"/>
      <line x1="-11.3" y1="11.3" x2="-7.8" y2="7.8"/>
      <line x1="7.8" y1="-7.8" x2="11.3" y2="-11.3"/>
    </g>
    <!-- Sun core (gold gradient look using overlay) -->
    <circle r="9" fill="#F59E0B"/>
    <circle r="6" fill="#10B981"/>
    <circle r="3" fill="#F9FAFB"/>
  </g>
  <!-- Company name text -->
  <text x="44" y="22" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#0F4C3A">SolarCore</text>
  <text x="44" y="38" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="400" fill="#F59E0B" letter-spacing="2">ENERGY</text>
</svg>
